{% extends "base.html" %}

{% block content %}
<h1>➕ Cargar nota</h1>

<p>
    Alumno: <strong>{{ inscripcion.alumno.username }}</strong><br>
    Curso: <strong>{{ inscripcion.curso.nombre }}</strong>
</p>

<form method="post">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">💾 Guardar nota</button>
</form>
<br>
<a href="{% url 'profesor_detalle_inscripcion' inscripcion.id %}" class="btn btn-secondary">
    ← Volver a ficha académica
</a>
{% endblock %}
