{% extends "base.html" %}

{% block content %}
<h1>Tomar asistenciaaa – {{ curso.nombre }}</h1>

<form method="post">
    {% csrf_token %}

    <label>
        Fecha:
        <input type="date" id="fecha" name="fecha" required>
    </label>

    <br><br>

    <table border="1">
        <thead>
            <tr>
                <th>Alumno</th>
                <th id="col-fecha">Presente</th>
            </tr>
        </thead>

        <tbody>
            {% for inscripcion in inscripciones %}
            <tr>
                <td>{{ inscripcion.alumno.username }}</td>
                <td align="center">
                    <input type="checkbox"
                           name="presente_{{ inscripcion.id }}"
                           checked>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="2">No hay alumnos</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <br>
    <button type="submit" class="btn btn-primary">Guardar asistencia</button>
</form>

<a href="{% url 'cursos_profesor' %}" class="btn btn-secondary">← Volver</a>

<!-- 🧠 JS -->
<script>
    const fechaInput = document.getElementById('fecha');
    const colFecha = document.getElementById('col-fecha');

    fechaInput.addEventListener('change', function () {
        if (this.value) {
            const partes = this.value.split('-');
            const fechaFormateada = `${partes[2]}/${partes[1]}/${partes[0]}`;
            colFecha.innerText = fechaFormateada;
        }
    });
</script>
{% endblock %}
